<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/styles.css">
<title>Animalchain · Üben</title>
</head>
<body data-page="practice">
<div class="shell">
<nav class="topbar">
<a class="brand" href="index.html">
<span class="brand-mark">A</span>
<span>Animalchain</span>
</a>
<div class="nav-links">
<a href="practice.html">Üben</a>
<a href="online.html">Online</a>
<a href="local.html">Lokal</a>
</div>
</nav>
<main class="page-grid">
<section class="panel wide">
<div class="panel-heading">
<p class="eyebrow">Übungsmodus</p>
<h1>Du gegen den Computer</h1>
</div>
<div class="status-grid">
<article class="stat">
<span>Letztes Tier</span>
<strong id="practiceLastAnimal">---</strong>
</article>
<article class="stat">
<span>Du brauchst</span>
<strong id="practiceRequiredLetter">---</strong>
</article>
<article class="stat">
<span>Züge</span>
<strong id="practiceMoveCount">0</strong>
</article>
</div>
<form id="practiceAnimalForm" class="input-row">
<input id="practiceAnimalInput" autocomplete="off" placeholder="Dein Tier, z. B. Esel">
<button class="button primary">Spielen</button>
</form>
<div class="actions-row">
<button id="practiceHintButton" class="button secondary" type="button">Tipp</button>
<button id="practiceNewRoundButton" class="button ghost" type="button">Neue Runde</button>
</div>
<p id="practiceMessage" class="message">Lade Supabase...</p>
</section>
<section class="panel">
<div class="panel-heading">
<p class="eyebrow">Verlauf</p>
<h2>Runde</h2>
</div>
<ol id="practiceMovesList" class="moves-list"></ol>
</section>
</main>
<footer class="footer">
<a href="index.html">Zurück</a>
<span>Übungsmodus</span>
</footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
</body>
</html>
