<section class="panel wide"><div class="panel-heading"><p class="eyebrow">Übungsmodus</p><h1>Du gegen den Computer</h1></div>

</main><footer class="footer"><a href="index.html">Zurück</a><span>Übungsmodus</span></footer></div>
