<body><div class="shell"><nav class="topbar">

<main class="page-grid">
<section class="panel"><div class="panel-heading"><p class="eyebrow">Ein Gerät</p><h1>Lokaler Mehrspieler</h1></div>
<form id="playersForm" class="stack-form"><label>Spieler, mit Komma getrennt</label><input id="playersInput" placeholder="Mia, Noah, Ben"><button class="button primary">Spiel starten</button></form><p class="hint">Tierprüfung kommt aus Supabase. Keine lokale Tierliste.</p></section>
<section class="panel wide"><div class="panel-heading"><p class="eyebrow">Spiel</p><h2 id="turnBadge">Noch nicht gestartet</h2></div>
<div class="status-grid"><article class="stat"><span>Letztes Tier</span><strong id="lastAnimal">---</strong></article><article class="stat"><span>Benötigt</span><strong id="requiredLetter">---</strong></article><article class="stat"><span>Züge</span><strong id="moveCount">0</strong></article></div>
<form id="animalForm" class="input-row"><input id="animalInput" placeholder="Tier eingeben"><button class="button primary">Spielen</button></form><div class="actions-row"><button id="newRoundButton" class="button ghost" type="button">Neue Runde</button></div><p id="gameMessage" class="message">Spieler eintragen und starten.</p></section>
<section class="panel"><div class="panel-heading"><p class="eyebrow">Spieler</p><h2>Reihenfolge</h2></div><div id="playersList" class="players-list"></div></section>
<section class="panel"><div class="panel-heading"><p class="eyebrow">Verlauf</p><h2>Züge</h2></div><ol id="movesList" class="moves-list"></ol></section>
</main><footer class="footer"><a href="index.html">Zurück</a><span>Lokaler Modus</span></footer></div>
