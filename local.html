<html lang="de">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="assets/styles.css"><title>Animalchain · Lokal</title></head>
<body data-page="local">
<div class="shell">
<nav class="topbar"><a class="brand" href="index.html"><span class="brand-mark">A</span><span>Animalchain</span></a><div class="nav-links"><a href="practice.html">Üben</a><a href="online.html">Online</a><a href="local.html" class="active">Lokal</a></div></nav>
<main class="page-grid">
<section class="panel wide"><div class="panel-heading"><p class="eyebrow">Lokal-Modus</p><h1>Mehrspieler auf einem Gerät</h1></div><form id="localPlayerForm" class="input-row"><input id="localPlayerName" maxlength="24" placeholder="Spielername"><button class="button secondary">Spieler hinzufügen</button></form><div class="actions-row"><button id="localNewRoundButton" class="button primary" type="button">Neue Runde</button><button id="localHintButton" class="button ghost" type="button">Tipp</button></div><p id="localMessage" class="message">Lade Supabase...</p></section>
