<!doctype html>
<html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/styles.css"><title>Animalchain · Online</title></head>
<body><div class="shell"><nav class="topbar">
<a class="brand" href="index.html"><span class="brand-mark">A</span><span>Animalchain</span></a>
<div class="nav-links">
<a href="practice.html">Üben</a><a href="online.html">Online</a><a href="local.html">Lokal</a>
</div>
</nav>
<main class="page-grid">
<section class="panel"><div class="panel-heading"><p class="eyebrow">Online-Lobby</p><h1>Mit Freunden spielen</h1></div>
<form id="guestForm" class="stack-form"><label>Gastname</label><input id="guestName" maxlength="24" placeholder="z. B. Quadercube"><button class="button secondary">Name setzen</button></form>
<div class="divider"></div><button id="createLobbyButton" class="button primary full" type="button">Lobby erstellen</button>
<form id="joinLobbyForm" class="stack-form"><label>Lobby-Code</label><input id="joinCode" maxlength="8" placeholder="z. B. WOLF123"><button class="button secondary">Beitreten</button></form>
<article id="lobbyTicket" class="ticket" hidden><span>Aktive Lobby</span><strong id="activeLobbyCode">----</strong><button id="copyLobbyButton" class="button ghost" type="button">Code kopieren</button></article>
</section>
<section class="panel wide"><div class="panel-heading"><p class="eyebrow">Spiel</p><h2 id="turnBadge">Keine Lobby aktiv</h2></div>
<div class="status-grid"><article class="stat"><span>Letztes Tier</span><strong id="lastAnimal">---</strong></article><article class="stat"><span>Benötigt</span><strong id="requiredLetter">---</strong></article><article class="stat"><span>Züge</span><strong id="moveCount">0</strong></article></div>
<form id="animalForm" class="input-row"><input id="animalInput" placeholder="Tier eingeben"><button class="button primary">Zug spielen</button></form><div class="actions-row"><button id="newRoundButton" class="button ghost" type="button">Neue Runde</button></div><p id="gameMessage" class="message">Namen setzen und Lobby starten.</p></section>
<section class="panel"><div class="panel-heading"><p class="eyebrow">Spieler</p><h2>Lobby</h2></div><div id="playersList" class="players-list"></div></section>
<section class="panel"><div class="panel-heading"><p class="eyebrow">Verlauf</p><h2>Züge</h2></div><ol id="movesList" class="moves-list"></ol></section>
</main><footer class="footer"><a href="index.html">Zurück</a><span>Online-Modus</span></footer></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/database.js"></script>
<script src="js/online.js"></script></body></html>
