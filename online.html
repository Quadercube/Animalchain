<!doctype html>
<html lang="de">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="assets/styles.css"><title>Animalchain · Online</title></head>
<body data-page="online">
<div class="shell">
<nav class="topbar"><a class="brand" href="index.html"><span class="brand-mark">A</span><span>Animalchain</span></a><div class="nav-links"><a href="practice.html">Üben</a><a href="online.html" class="active">Online</a><a href="local.html">Lokal</a></div></nav>
<main class="page-grid">
<section class="panel wide"><div class="panel-heading"><p class="eyebrow">Online-Modus</p><h1>Lobby für mehrere Geräte</h1></div><form id="guestForm" class="stack-form"><input id="guestName" maxlength="24" placeholder="Dein Gastname"><button class="button secondary">Gastname speichern</button></form><p class="hint">Aktueller Name: <strong id="currentGuestName">Gast</strong></p><div class="actions-row"><button id="createLobbyButton" class="button primary" type="button">Lobby erstellen</button><button id="copyLobbyButton" class="button secondary" type="button">Code kopieren</button></div><p class="hint">Lobby-Code:</p><div id="activeLobbyCode" class="lobby-code">----</div><form id="joinLobbyForm" class="input-row"><input id="joinCode" placeholder="Code eingeben"><button class="button primary">Beitreten</button></form><p id="onlineMessage" class="message">Bereit.</p></section>
<section class="panel"><div class="panel-heading"><p class="eyebrow">Spieler</p><h2>Lobby</h2></div><div id="playersList" class="players-list"></div></section>
<section class="panel wide"><div class="panel-heading"><p class="eyebrow">Runde</p><h2>Online-Spiel</h2></div><div class="status-grid"><article class="stat"><span>Letztes Tier</span><strong id="lastAnimal">---</strong></article><article class="stat"><span>Du brauchst</span><strong id="requiredLetter">---</strong></article><article class="stat"><span>Dran</span><strong id="turnPlayer">---</strong></article></div><form id="onlineAnimalForm" class="input-row"><input id="onlineAnimalInput" autocomplete="off" placeholder="Tier eingeben"><button class="button primary">Spielen</button></form><ol id="onlineMovesList" class="moves-list"></ol></section>
</main>
<footer class="footer"><a href="index.html">Zurück</a><span>Animalchain · Online</span></footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/app.js"></script>
</body></html>
